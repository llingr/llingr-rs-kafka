version = 1

# Bulk annotation for files that cannot or should not carry in-file SPDX
# headers (structured configs, prose, attribution files, generated notices, the
# lockfile, and the Go bridge manifests). Real source files (src/*.rs, build.rs,
# bridge/*.go) and the build scripts (Makefile, docker/Dockerfile.builder,
# gen-third-party-notices.sh) carry their own in-file headers instead;
# precedence = "closest" keeps any in-file header authoritative.
[[annotations]]
path = [
    ".dockerignore",
    ".fossa.yml",
    ".github/**",
    ".gitignore",
    "AUTHORS",
    "CODE_OF_CONDUCT.md",
    "CONTRIBUTING.md",
    "COPYRIGHT",
    "Cargo.lock",
    "abi-check/Cargo.lock",
    "example/Cargo.lock",
    "README.md",
    "SECURITY.md",
    "THIRD-PARTY-NOTICES",
    "deny.toml",
    "bridge/go.mod",
    "bridge/go.sum",
    "docs/**/*.md",
    "example/**/*.md",
]
precedence = "closest"
SPDX-FileCopyrightText = "Copyright (c) 2026 The llingr-rs-kafka Authors"
SPDX-License-Identifier = "AGPL-3.0-only OR LicenseRef-Llingr-Commercial"
