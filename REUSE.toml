version = 1

# Bulk SPDX licensing so config, lockfiles, manifests, prose, and Dockerfiles
# need no in-file header. precedence = "closest" keeps any header a file does have.
[[annotations]]
path = [
    ".dockerignore",
    ".github/**",
    ".gitignore",
    "AUTHORS",
    "COPYRIGHT",
    "THIRD-PARTY-NOTICES",
    "**/Dockerfile",
    "**/*.md",
    "**/*.toml",
    "**/*.lock",
    "**/*.mod",
    "**/*.sum",
    "**/*.yml",
    "**/*.yaml",
]
precedence = "closest"
SPDX-FileCopyrightText = "Copyright (c) 2026 The llingr-rs-kafka Authors"
SPDX-License-Identifier = "AGPL-3.0-only OR LicenseRef-Llingr-Commercial"
