name: Vulncheck

on:
  # Called by the Pipeline orchestrator on push/PR; runs standalone on the
  # weekly cron so scans keep landing between commits.
  workflow_call:
  schedule:
    - cron: '45 5 * * 2'

permissions:
  contents: read

jobs:
  cargo-audit:
    name: cargo audit
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master 2026-07-15
        with:
          toolchain: stable
      # Pinned tool version; the RustSec advisory database is still fetched
      # fresh at scan time, so detection stays current.
      - run: cargo install cargo-audit --locked --version 0.22.2
      - run: cargo audit

  cargo-deny:
    name: cargo deny
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master 2026-07-15
        with:
          toolchain: stable
      # Installer action is digest-pinned; cargo-deny itself is pinned to the
      # validated version so a schema change (as happened with licenses v2)
      # cannot surprise CI on a floating fetch. `cargo deny check` reads deny.toml
      # and Cargo.lock without building, so no Go toolchain is needed here. It
      # runs advisories, bans, licenses and sources: the licence allow-list plus
      # the RustSec advisory database.
      - uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2.83.2
        with:
          tool: cargo-deny@0.20.2
      - run: cargo deny check
