name: Lint

on:
  workflow_call:

permissions:
  contents: read

jobs:
  rustfmt-clippy:
    name: rustfmt & clippy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      # clippy --all-targets compiles the crate, whose build.rs builds the Go
      # engine bridge via cgo; the runner already provides a C compiler, so only
      # Go needs installing.
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: '1.25'
          cache-dependency-path: bridge/go.sum
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master 2026-07-15
        with:
          toolchain: stable
          components: rustfmt, clippy
      # Same commands as `make lint`, so CI and the pre-push default agree.
      - run: cargo fmt --check
      - run: cargo clippy --all-targets --locked -- -D warnings
