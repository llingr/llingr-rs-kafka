name: CI

on:
  workflow_call:

permissions:
  contents: read

jobs:
  build:
    name: build & doc
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      # The crate's build.rs compiles the Go engine bridge (go build
      # -buildmode=c-archive) via cgo, so the build and doc steps need Go on
      # PATH; the runner already provides a C compiler for cgo.
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: '1.25'
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master 2026-07-15
        with:
          toolchain: stable
      - run: cargo build --all-targets --locked
      # Rustdoc warnings fail here rather than on docs.rs after publish
      # (missing docs are already a compile error via #![deny(missing_docs)]).
      - run: RUSTDOCFLAGS="-D warnings" cargo doc --no-deps --locked

# The test suite runs instrumented in the Coverage workflow (coverage.yml), so
# there is no separate plain-test job here: coverage.yml is the test runner.
