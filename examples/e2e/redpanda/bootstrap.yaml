# Redpanda CLUSTER-config seed, mounted at /etc/redpanda/.bootstrap.yaml. These
# are cluster properties (not node config), applied once at first boot: turn on
# SASL for every Kafka listener and make "appuser" a superuser. The appuser's
# SCRAM-SHA-256 credential is created separately by the init service via the
# admin API (which needs no auth by default), because a bootstrap file seeds
# properties, not user secrets.
superusers:
  - appuser
enable_sasl: true
