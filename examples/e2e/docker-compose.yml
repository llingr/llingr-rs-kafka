#
# The end-to-end proof, as a single compose stack on one network, secured with
# SASL/SCRAM-SHA-256 over TLS (sasl_ssl). The consumer's exit code is the
# verdict: 0 means the whole demux + franz + FFI + log + metrics chain worked
# against a real, authenticated broker. `make example-verify` brings the stack
# up detached (up -d), blocks on `docker wait` for the consumer container,
# prints the logs, then tears down with `down -v`, preserving the consumer's
# exit code. It deliberately does NOT use `--exit-code-from consumer`: that
# implies `--abort-on-container-exit`, which tears the whole stack down the
# instant a one-shot (cert-gen / init) exits, killing redpanda before the
# consumer connects.
#
# Flow: cert-gen mints a throwaway CA + broker cert (SAN "redpanda") into a
# volume; redpanda comes up with a sasl_ssl listener and reports healthy; init
# creates the SCRAM-SHA-256 superuser via the admin API and the orders topic
# (12 partitions) over sasl_ssl; the producer publishes 1000 order events over
# sasl_ssl and exits; the consumer processes them, asserting the key ==
# body.orderId invariant per message, and exits 0 once it has seen all 1000.
# Certs and the SCRAM password live only in the volume/env, never committed.

name: llingr-kafka-example

volumes:
  certs:

services:
  # One-shot: mint a self-signed CA + broker cert (SAN covers "redpanda") into
  # the shared certs volume. Exits before redpanda starts.
  cert-gen:
    image: alpine/openssl:latest
    entrypoint: ["/bin/sh"]
    command: ["/gen-certs.sh"]
    volumes:
      - certs:/certs
      - ./scripts/gen-certs.sh:/gen-certs.sh:ro
    restart: "no"

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.2.7
    depends_on:
      cert-gen:
        condition: service_completed_successfully
    volumes:
      - certs:/certs:ro
      - ./redpanda:/cfg:ro
    # rpk rewrites redpanda.yaml at startup, so the config cannot be a read-only
    # bind mount (rename-over-mount fails, "device busy"). Copy the configs into
    # the container's writable /etc/redpanda first, then start. The sasl_ssl
    # listener and its TLS live in redpanda.yaml (rpk's `redpanda start` has no
    # --set flag); enable_sasl and the superuser are cluster config in
    # .bootstrap.yaml.
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        cp /cfg/redpanda.yaml /etc/redpanda/redpanda.yaml
        cp /cfg/bootstrap.yaml /etc/redpanda/.bootstrap.yaml
        exec rpk redpanda start --smp=1 --overprovisioned --node-id=0 --check=false
    healthcheck:
      # The admin API (9644) needs no auth by default, so cluster health still
      # probes cleanly with SASL enabled on the Kafka listener.
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 3s
      timeout: 5s
      retries: 30

  # One-shot: create the SCRAM-SHA-256 superuser (via the no-auth admin API),
  # then create the orders topic with 12 partitions over the sasl_ssl listener.
  init:
    image: docker.redpanda.com/redpandadata/redpanda:v24.2.7
    depends_on:
      redpanda:
        condition: service_healthy
    volumes:
      - certs:/certs:ro
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -eu
        rpk security user create appuser -p apppassword --mechanism SCRAM-SHA-256 \
          -X admin.hosts=redpanda:9644
        rpk topic create orders -p 12 \
          -X brokers=redpanda:9092 \
          -X sasl.mechanism=SCRAM-SHA-256 -X user=appuser -X pass=apppassword \
          -X tls.enabled=true -X tls.ca=/certs/ca-cert.pem
    restart: "no"

  producer:
    build:
      context: .
      dockerfile: Dockerfile.producer
    depends_on:
      init:
        condition: service_completed_successfully
    volumes:
      - certs:/certs:ro
    environment:
      BROKERS: redpanda:9092
      TOPIC: orders
      COUNT: "1000"
      SASL_USERNAME: appuser
      SASL_PASSWORD: apppassword
      TLS_CA_LOCATION: /certs/ca-cert.pem

  # Starts alongside the producer: AutoOffsetReset::Earliest makes ordering
  # between them moot. Port 9464 is published so /metrics can be curled mid-run.
  consumer:
    build:
      context: ../..
      dockerfile: examples/e2e/Dockerfile.consumer
    depends_on:
      init:
        condition: service_completed_successfully
    volumes:
      - certs:/certs:ro
    environment:
      BROKERS: redpanda:9092
      TOPIC: orders
      EXPECTED: "1000"
      SASL_USERNAME: appuser
      SASL_PASSWORD: apppassword
      TLS_CA_LOCATION: /certs/ca-cert.pem
      RUST_LOG: info
    ports:
      - "9464:9464"
